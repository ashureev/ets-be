spring.application.name=ets_project

#SERVER PORT
server.port=8081

#DB CONFIGURATATION 
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/ets_project
spring.datasource.username=root
spring.datasource.password=root


#JPA/HIBERNATE CONFIGURATION

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.springframework.security=DEBUG

spring.mail.properties.mail.debug=true
logging.level.org.springframework.mail=DEBUG
logging.level.org.eclipse.angus.mail=DEBUG

#Mail
app.reset.base-url=http://localhost:3000/reset-password


# === EMAIL CONFIGURATION (REQUIRED FOR REGISTRATION EMAILS) ===
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=INSERT_YOUR_GMAIL_HERE@gmail.com
spring.mail.password=INSERT_YOUR_GMAIL_APP_PASSWORD_HERE
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
